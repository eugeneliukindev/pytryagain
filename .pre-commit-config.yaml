repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        name: Check for large files

      - id: check-ast
        name: Check Python AST syntax

      - id: check-case-conflict
        name: Check filename case conflicts

      - id: check-executables-have-shebangs
        name: Check executables have shebangs

      - id: check-json
        name: Check JSON syntax

      - id: check-toml
        name: Check TOML syntax

      - id: check-yaml
        name: Check YAML syntax

      - id: check-merge-conflict
        name: Check for merge conflict markers

      - id: check-shebang-scripts-are-executable
        name: Check shebang scripts are executable

      - id: debug-statements
        name: Check for debug statements

      - id: detect-private-key
        name: Detect private keys

      - id: end-of-file-fixer
        name: Fix end of files

      # - id: no-commit-to-branch
      #   name: Prevent commits to protected branches
      #   args: [--branch, main, --branch, master]

      - id: mixed-line-ending
        name: Fix mixed line endings
        args: [--fix=lf]

      - id: trailing-whitespace
        name: Trim trailing whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        name: Lint with ruff

      - id: ruff-format
        name: Format with ruff

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.18
    hooks:
      - id: uv-lock
        name: Check uv.lock is in sync with pyproject.toml

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.8.3
    hooks:
      - id: commitizen
        name: Check commit message follows Conventional Commits
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: mypy
        name: Type check with mypy
        entry: uv run --frozen --group typing mypy src/
        language: system
        types: [python]
        pass_filenames: false
